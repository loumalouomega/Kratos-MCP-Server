name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync
      - name: Run unit tests (Kratos integration tests are skipped without a build)
        run: uv run pytest -m "not kratos" -q

  test-viz:
    name: Visualization tests (pyvista, headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install headless rendering support
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglx-mesa0 xvfb
      - name: Install dependencies with the viz extra
        run: uv sync --extra viz
      # xvfb-run gives the render worker a display; the worker's own
      # Xvfb auto-start path is covered by a dedicated no-DISPLAY test.
      - name: Run visualization tests
        run: xvfb-run -a uv run pytest tests/test_visualize.py -m "not kratos" -q

  build-package:
    name: Build Python package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist and wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*

  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run docs:build
      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/.vitepress/dist
